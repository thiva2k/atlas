"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
scan_timeout = 10
command_timeout = 250
palette = 'atlas'
format = '$directory$git_branch$git_status$python$nodejs$docker_context$cmd_duration$time$line_break$character'

[palettes.atlas]
atlas_blue = '#4ea1ff'
atlas_cyan = '#7dd3fc'
atlas_green = '#8bd17c'
atlas_muted = '#8a94a6'
atlas_red = '#ff6b6b'

[directory]
format = '[$path]($style) '
style = 'bold atlas_blue'
truncation_length = 3
truncate_to_repo = true
read_only = ' ro'

[git_branch]
format = '[$branch]($style) '
style = 'atlas_blue'
symbol = ''

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'atlas_muted'
conflicted = '!${count}'
ahead = '>${count}'
behind = '<${count}'
diverged = '<>${ahead_count}/${behind_count}'
untracked = '?${count}'
stashed = 's${count}'
modified = '~${count}'
staged = '+${count}'
renamed = 'r${count}'
deleted = '-${count}'

[python]
format = '[py ${version}${virtualenv}]($style) '
style = 'atlas_green'
symbol = ''

[nodejs]
format = '[node $version]($style) '
style = 'atlas_green'
symbol = ''

[docker_context]
format = '[docker $context]($style) '
style = 'atlas_cyan'
symbol = ''
only_with_files = true

[cmd_duration]
format = '[$duration]($style) '
style = 'atlas_muted'
min_time = 500

[time]
disabled = false
format = '[$time]($style) '
style = 'atlas_muted'
time_format = '%H:%M'

[character]
success_symbol = '[>](bold atlas_blue)'
error_symbol = '[>](bold atlas_red)'
vimcmd_symbol = '[<](bold atlas_blue)'
