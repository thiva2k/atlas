"$schema" = 'https://starship.rs/config-schema.json'

# Atlas HUD prompt (RFC-0034): a console readout, not a powerline. Hairline color
# separation; the character is the orbital node ◐ that ignites cyan when ready.
add_newline = false
scan_timeout = 10
command_timeout = 250
palette = 'atlas'
format = '$directory$git_branch$git_status$python$nodejs$docker_context$cmd_duration$time$line_break$character'

[palettes.atlas]
atlas_blue = '#5aa2ff'
atlas_cyan = '#57e5ff'
atlas_green = '#8bd17c'
atlas_muted = '#7d8aa0'
atlas_red = '#ff6b5a'

[directory]
format = '[$path]($style) '
style = 'bold atlas_blue'
truncation_length = 3
truncate_to_repo = true
read_only = ' '

[git_branch]
format = '[$symbol$branch]($style) '
style = 'atlas_blue'
symbol = ' '

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'atlas_muted'
conflicted = '!${count}'
ahead = '>${count}'
behind = '<${count}'
diverged = '<>${ahead_count}/${behind_count}'
untracked = '?${count}'
stashed = 's${count}'
modified = '~${count}'
staged = '+${count}'
renamed = 'r${count}'
deleted = '-${count}'

[python]
format = '[py ${version}${virtualenv}]($style) '
style = 'atlas_green'
symbol = ''

[nodejs]
format = '[node $version]($style) '
style = 'atlas_green'
symbol = ''

# docker downshifts to structural blue so the ◐ node stays the single brightest cyan.
[docker_context]
format = '[docker $context]($style) '
style = 'atlas_blue'
symbol = ''
only_with_files = true

[cmd_duration]
format = '[$duration]($style) '
style = 'atlas_muted'
min_time = 500

[time]
disabled = false
format = '[$time]($style) '
style = 'atlas_muted'
time_format = '%H:%M'

# The orbital node — the through-line. The same glyph ignites at boot, frames the
# lock clock, and marks every ready shell line. Cyan when ready, warm on error.
[character]
success_symbol = '[◐](bold atlas_cyan)'
error_symbol = '[◐](bold atlas_red)'
vimcmd_symbol = '[◑](bold atlas_blue)'
