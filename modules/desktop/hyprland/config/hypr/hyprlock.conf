# =============================================================================
#  ATLAS — hyprlock (lock screen), B&W word-only identity (Fable spec 2026-07-16)
#
#  The two-tone ATLAS masthead (white blocks + grey shadow) is BAKED into the
#  background PNG by assets/generate.sh — same technique as the Plymouth boot
#  and SDDM login, so the wordmark is pixel-perfect and can never misregister.
#  Live elements (clock, date, password field) are drawn over it by hyprlock.
#  Deployed background: ~/.local/share/backgrounds/atlas/atlas-lock-bg.png
# =============================================================================

$font = JetBrainsMono Nerd Font

background {
    monitor =
    path = /home/thiva/.local/share/backgrounds/atlas/atlas-lock-bg.png
    color = rgb(070707)
    blur_passes = 0
}

# Clock — the focal element. 24h, JBM ExtraBold, 70px above screen centre.
label {
    monitor =
    text = cmd[update:1000] date +%H:%M
    color = rgb(f2f2f2)
    font_size = 128
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 70
    halign = center
    valign = center
}

# Date — uppercase, dim, just below centre.
label {
    monitor =
    text = cmd[update:60000] date '+%a %d %b %Y' | tr a-z A-Z
    color = rgb(6a6a6a)
    font_size = 20
    font_family = $font
    position = 0, -30
    halign = center
    valign = center
}

# Password field — resting grey border; verify → white; fail → the one red.
input-field {
    monitor =
    size = 360, 52
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    rounding = 0
    outer_color = rgb(5a5a5a)
    inner_color = rgb(070707)
    font_color = rgb(f2f2f2)
    check_color = rgb(f2f2f2)
    fail_color = rgb(E5484D)
    capslock_color = rgb(E5484D)
    placeholder_text = password
    fail_text = DENIED · $ATTEMPTS
    fade_on_empty = false
    font_family = $font
    position = 0, -140
    halign = center
    valign = center
}

# Hint — a single quiet word at the bottom edge.
label {
    monitor =
    text = locked
    color = rgb(6a6a6a)
    font_size = 14
    font_family = $font
    position = 0, 40
    halign = center
    valign = bottom
}
