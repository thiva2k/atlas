# =============================================================================
#  ATLAS — Hyprland compositor config
#  B&W word-only identity (see docs/superpowers/specs/2026-07-16-atlas-hyprland-*).
#  Tiling-first with full mouse support. Window chrome per Fable's spec:
#  1px hairline borders (active #f2f2f2 / inactive #2a2a2a), 0px rounding,
#  6/12 gaps, no blur, no shadows, sub-150ms ambient motion.
# =============================================================================

# ---- monitors ---------------------------------------------------------------
# Auto-detect; native panel is 1920x1080. `preferred` keeps it safe on any panel.
monitor = , preferred, auto, 1

# ---- programs ---------------------------------------------------------------
$terminal = kitty
$menu     = wofi --show drun
$lock     = hyprlock

# ---- autostart --------------------------------------------------------------
exec-once = waybar
exec-once = mako
exec-once = hyprpaper
exec-once = hypridle
# KDE's polkit agent is present (from Plasma) and works under Hyprland.
exec-once = /usr/libexec/polkit-kde-authentication-agent-1
# Keep the clipboard usable across the session.
exec-once = wl-paste --watch cliphist store

# ---- environment ------------------------------------------------------------
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# Qt apps (our SDDM greeter's cousins, KDE apps) render cleanly on Wayland.
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1

# ---- look & feel ------------------------------------------------------------
general {
    border_size = 1
    gaps_in = 6
    gaps_out = 12
    col.active_border = rgb(f2f2f2)
    col.inactive_border = rgb(2a2a2a)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

# Ambient motion only — everything under 150ms, ease-out, nothing overshoots.
animations {
    enabled = true
    bezier = atlasOut, 0.2, 0.0, 0.0, 1.0
    animation = windows,     1, 1.2, atlasOut
    animation = windowsOut,  1, 1.2, atlasOut, popin 80%
    animation = fadeIn,      1, 1.2, atlasOut
    animation = fadeOut,     1, 1.2, atlasOut
    animation = border,      1, 1.0, atlasOut
    animation = workspaces,  1, 1.5, atlasOut, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    background_color = rgb(070707)
    vfr = true
}

# ---- input ------------------------------------------------------------------
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

gestures {
    workspace_swipe = true
}

# ---- keybindings ------------------------------------------------------------
$mainMod = SUPER

# Core
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, dolphin
bind = $mainMod, V, togglefloating,
bind = $mainMod, Space, exec, $menu
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo,          # dwindle
bind = $mainMod, J, togglesplit,     # dwindle
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, L, exec, $lock

# Focus with arrow keys (Super+L stays reserved for Lock, above)
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Move windows
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Workspaces 1-10
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace 1-10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Mouse drag to move/resize (the "sane mouse support")
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots (grim + slurp): region to clipboard, full screen to file
bind = , Print, exec, grim - | wl-copy
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | wl-copy

# Media / brightness keys
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl  = , XF86AudioPlay,  exec, playerctl play-pause
bindl  = , XF86AudioNext,  exec, playerctl next
bindl  = , XF86AudioPrev,  exec, playerctl previous

# ---- window rules -----------------------------------------------------------
windowrulev2 = suppressevent maximize, class:.*
# Fix occasional dragging issues with some XWayland windows
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
# Common dialogs float
windowrulev2 = float, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save File)$
windowrulev2 = float, class:^(pavucontrol)$
