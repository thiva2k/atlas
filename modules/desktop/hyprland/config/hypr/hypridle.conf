# =============================================================================
#  ATLAS — hypridle. Idle → dim → lock → screen-off → suspend.
#  Lock is hyprlock (the Atlas B&W lock). loginctl integration means the lock
#  also fires on lid-close and before sleep, so the machine is never left open.
# =============================================================================

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Dim the backlight first as a gentle warning (restored on any activity).
listener {
    timeout = 270
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

# Lock after 5 minutes.
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Turn the display off shortly after locking.
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 30 minutes idle.
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
