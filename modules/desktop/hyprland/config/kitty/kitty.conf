# ATLAS kitty — Windows Terminal look & feel (Campbell + bar cursor).
#
# Goal: match Windows Terminal's PowerShell/cmd UX, not a generic dark theme.
# - Host: pure black (#000000), opaque — not charcoal #070707
# - Text: Campbell foreground #CCCCCC
# - Selection: Windows Terminal blue (#264F78)
# - Cursor: thin vertical bar (pipe), continuously blinking — never a block
# - ANSI: Microsoft Campbell palette (same numbers WT ships)
#
# Font: Cascadia Mono is Windows Terminal's default. Prefer it when installed;
# otherwise JetBrainsMono Nerd Font (Atlas desktop/fonts, already system-wide).
# Override locally with a user kitty.conf fragment if desired.
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
font_size        12.0

# ---- Host chrome -----------------------------------------------------------
background            #000000
foreground            #CCCCCC
selection_background  #264F78
selection_foreground  #FFFFFF
url_color             #3B78FF

background_opacity           1.0
window_padding_width         4
confirm_os_window_close      0
enable_audio_bell            no
visual_bell_duration         0
# Hide mouse while typing — WT-like console feel
mouse_hide_wait              3.0

# ---- Cursor: thin blinking pipe (NOT a block) ------------------------------
# kitty "beam" == vertical bar. Thickness 1.0 is a slim pipe; 1.5 reads thick.
cursor_shape                 beam
cursor_shape_unfocused       hollow
cursor_beam_thickness        1.0
cursor_blink_interval        0.5
# 0 = keep blinking forever (Windows Terminal default behavior)
cursor_stop_blinking_after   0
cursor                       #FFFFFF
cursor_text_color            #000000
# Prevent shell-integration from changing shape at the prompt
shell_integration            no-cursor

# ---- Tab bar: minimal console chrome ---------------------------------------
tab_bar_style                separator
tab_separator                "  "
active_tab_foreground        #000000
active_tab_background        #CCCCCC
inactive_tab_foreground      #767676
inactive_tab_background      #000000

# ---- Microsoft Campbell ANSI (Windows Terminal) ----------------------------
# https://learn.microsoft.com/windows/terminal/customize-settings/color-schemes
# black
color0   #0C0C0C
color8   #767676
# red
color1   #C50F1F
color9   #E74856
# green
color2   #13A10E
color10  #16C60C
# yellow
color3   #C19C00
color11  #F9F1A5
# blue
color4   #0037DA
color12  #3B78FF
# purple / magenta
color5   #881798
color13  #B4009E
# cyan
color6   #3A96DD
color14  #61D6D6
# white
color7   #CCCCCC
color15  #F2F2F2
