# ATLAS kitty — Windows Terminal / PowerShell console look.
# Pure black host, Campbell ANSI palette, blinking beam (pipe) cursor.

font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
font_size        11.0

# Pure black host (not charcoal / grey)
background            #000000
foreground            #CCCCCC
selection_background  #264F78
selection_foreground  #FFFFFF
url_color             #3B78FF

# Blinking pipe cursor (beam), not a block
cursor_shape              beam
cursor_beam_thickness     1.5
cursor_blink_interval     0.5
cursor_stop_blinking_after 0
cursor                    #FFFFFF
cursor_text_color         #000000
# Keep our beam; don't let shell-integration flip the shape
shell_integration         no-cursor

background_opacity        1.0
window_padding_width      8
confirm_os_window_close   0
enable_audio_bell         no

# Tab bar — console chrome on black
tab_bar_style             separator
tab_separator             "  "
active_tab_foreground     #000000
active_tab_background     #CCCCCC
inactive_tab_foreground   #767676
inactive_tab_background   #000000

# ---- Windows console "Campbell" ANSI palette --------------------------------
# black
color0   #0C0C0C
color8   #767676
# red
color1   #C50F1F
color9   #E74856
# green
color2   #13A10E
color10  #16C60C
# yellow
color3   #C19C00
color11  #F9F1A5
# blue (PowerShell-ish)
color4   #0037DA
color12  #3B78FF
# magenta
color5   #881798
color13  #B4009E
# cyan
color6   #3A96DD
color14  #61D6D6
# white
color7   #CCCCCC
color15  #F2F2F2
