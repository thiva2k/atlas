# ATLAS kitty — Windows/PowerShell console look: pure #000000 black, a single blinking
# beam cursor, JetBrainsMono. The ANSI palette stays the Atlas greyscale ramp with the
# single red preserved for the red slots, so colored output (diffs, TUIs) stays legible
# while the chrome reads like a Windows terminal.

font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
font_size        11.0

background            #000000
foreground           #f2f2f2
cursor               #f2f2f2
cursor_text_color    #000000
selection_background #f2f2f2
selection_foreground #000000
url_color            #8a8a8a

# cursor — single blinking pipe (Windows/PowerShell beam), never a block
cursor_shape             beam
cursor_beam_thickness    1.5
cursor_blink_interval    0.5
cursor_stop_blinking_after 0

background_opacity   1.0
window_padding_width 8
confirm_os_window_close 0
enable_audio_bell    no

# tab bar — minimal, word-only
tab_bar_style        separator
tab_separator        "  "
active_tab_foreground   #000000
active_tab_background   #f2f2f2
inactive_tab_foreground #6a6a6a
inactive_tab_background #000000

# ---- ANSI palette: greyscale + one red -------------------------------------
# black
color0  #000000
color8  #5a5a5a
# red = the single Atlas alert red
color1  #E5484D
color9  #E5484D
# green -> light grey (still distinct from red in diffs)
color2  #b8b8b8
color10 #d6d6d6
# yellow -> grey
color3  #8a8a8a
color11 #a8a8a8
# blue -> grey
color4  #6a6a6a
color12 #8a8a8a
# magenta -> grey
color5  #9a9a9a
color13 #c8c8c8
# cyan -> grey
color6  #a8a8a8
color14 #e8e8e8
# white
color7  #d6d6d6
color15 #f2f2f2
