<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="16" height="16" role="img" aria-label="Atlas">
  <!-- Atlas mark, favicon variant (<=32px): drop the faint orbit + crossbar,
       bump arc/node weight, tighten glow so it doesn't bleed the silhouette. -->
  <defs>
    <linearGradient id="atlasArm16" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3f7fe0"/>
      <stop offset="1" stop-color="#57e5ff"/>
    </linearGradient>
    <radialGradient id="atlasNode16">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#cfeaff"/>
      <stop offset="0.75" stop-color="#57e5ff"/>
      <stop offset="1" stop-color="#57e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="atlasGlow16" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#atlasGlow16)">
    <path d="M 14 52 C 20 30, 27 16, 32 12" stroke="url(#atlasArm16)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 32 12 C 37 16, 44 30, 50 52" stroke="url(#atlasArm16)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="32" cy="12" r="4.6" fill="url(#atlasNode16)"/>
  </g>
</svg>
