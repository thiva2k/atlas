<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440">
  <!-- Atlas login canvas — RFC-0036. Deep-navy armillary scene for the STOCK
       plasma-login-greeter wallpaper (org.kde.image). Composition is weighted
       toward the upper-right quadrant; the lower-center third (where the
       greeter centers its password box) is kept clear and darkest so the
       stock login UI stays legible over it. Palette from desktop/identity
       tokens.env (RFC-0034): navy ramp #0d1420/#0a0e14, accent #5aa2ff,
       live-cyan #57e5ff, ink #e6edf3. -->
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0.65" y2="1">
      <stop offset="0" stop-color="#0d1420"/>
      <stop offset="0.55" stop-color="#0b121c"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>

    <!-- vignette that darkens the lower-center third where the password box sits -->
    <radialGradient id="loginClear" cx="0.5" cy="0.86" r="0.62">
      <stop offset="0" stop-color="#05080c" stop-opacity="0.75"/>
      <stop offset="0.45" stop-color="#05080c" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#05080c" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="haze" cx="0.78" cy="0.30" r="0.55">
      <stop offset="0" stop-color="#123b66" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#0f2033" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0f2033" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="arm" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3f7fe0"/>
      <stop offset="1" stop-color="#57e5ff"/>
    </linearGradient>

    <radialGradient id="node">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#cfeaff"/>
      <stop offset="0.7" stop-color="#57e5ff"/>
      <stop offset="1" stop-color="#57e5ff" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- faint grid, fades toward the bottom so it never competes with the login box -->
    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5aa2ff" stop-opacity="0.10"/>
      <stop offset="0.6" stop-color="#5aa2ff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#5aa2ff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#5aa2ff" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- base -->
  <rect width="2560" height="1440" fill="url(#ground)"/>
  <rect width="2560" height="1440" fill="url(#haze)"/>

  <!-- grid, masked to the upper 2/3 via the fade gradient overlay -->
  <rect width="2560" height="1440" fill="url(#grid)" opacity="0.55"/>
  <rect width="2560" height="1440" fill="url(#gridFade)"/>

  <!-- distant thin orbit lines drifting across the whole canvas -->
  <g fill="none" stroke="#5aa2ff" opacity="0.14">
    <ellipse cx="1970" cy="430" rx="1450" ry="560"/>
    <ellipse cx="1970" cy="430" rx="1080" ry="420" stroke-width="1.5"/>
  </g>

  <!-- primary armillary system, upper-right quadrant -->
  <g transform="translate(1970 430)">
    <g fill="none" stroke="#5aa2ff" opacity="0.42">
      <ellipse rx="620" ry="620" stroke-width="1.4"/>
      <ellipse rx="620" ry="230" stroke-width="1.8" transform="rotate(-18)"/>
      <ellipse rx="480" ry="480" stroke-width="1.2" opacity="0.7"/>
      <ellipse rx="420" ry="150" stroke-width="1.6" transform="rotate(24)"/>
      <ellipse rx="300" ry="300" stroke-width="1" opacity="0.55"/>
    </g>
    <!-- orbit chord accents -->
    <path d="M -620 0 L 620 0" stroke="#5aa2ff" stroke-width="1" opacity="0.25"/>
    <path d="M 0 -620 L 0 620" stroke="#5aa2ff" stroke-width="1" opacity="0.18"/>

    <!-- outer ring, brighter -->
    <ellipse rx="760" ry="760" fill="none" stroke="#5aa2ff" stroke-width="2" opacity="0.30" filter="url(#softGlow)"/>

    <!-- the bright live node -->
    <g filter="url(#glow)">
      <circle r="34" fill="url(#node)"/>
      <circle r="7" fill="#ffffff"/>
    </g>

    <!-- small satellite nodes along the rings -->
    <circle cx="620" cy="0" r="5" fill="#e6edf3" opacity="0.8"/>
    <circle cx="-590" cy="-172" r="4" fill="#5aa2ff" opacity="0.7"/>
    <circle cx="410" cy="-292" r="3.5" fill="#5aa2ff" opacity="0.6"/>
  </g>

  <!-- secondary smaller orbit, far upper-left, keeps balance without crowding center -->
  <g transform="translate(430 260)" opacity="0.5">
    <ellipse rx="260" ry="260" fill="none" stroke="#5aa2ff" stroke-width="1" opacity="0.30"/>
    <ellipse rx="260" ry="95" fill="none" stroke="#5aa2ff" stroke-width="1.2" opacity="0.24" transform="rotate(-12)"/>
    <circle r="10" fill="url(#node)" opacity="0.8"/>
  </g>

  <!-- scattered faint stars, avoiding the lower-center clear zone -->
  <g fill="#e6edf3">
    <circle cx="220" cy="120" r="1.6" opacity="0.55"/>
    <circle cx="640" cy="80" r="1.2" opacity="0.4"/>
    <circle cx="1120" cy="180" r="1.4" opacity="0.5"/>
    <circle cx="1540" cy="90" r="1.1" opacity="0.4"/>
    <circle cx="2260" cy="160" r="1.5" opacity="0.5"/>
    <circle cx="2440" cy="640" r="1.3" opacity="0.45"/>
    <circle cx="2360" cy="980" r="1.1" opacity="0.35"/>
    <circle cx="120" cy="560" r="1.3" opacity="0.4"/>
    <circle cx="90" cy="900" r="1.1" opacity="0.3"/>
    <circle cx="2510" cy="1180" r="1.2" opacity="0.3"/>
  </g>

  <!-- the Orbital-A mark, small and quiet, upper-left corner -->
  <g transform="translate(120 100) scale(1.6)">
    <ellipse cx="32" cy="34" rx="22" ry="9" transform="rotate(-15 32 34)"
             fill="none" stroke="#5aa2ff" stroke-width="1" opacity="0.30"/>
    <path d="M 22 38 L 42 38" stroke="#5aa2ff" stroke-width="1.6" opacity="0.55" stroke-linecap="round"/>
    <g filter="url(#softGlow)" opacity="0.92">
      <path d="M 14 52 C 20 30, 27 16, 32 12" stroke="url(#arm)" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 32 12 C 37 16, 44 30, 50 52" stroke="url(#arm)" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="32" cy="12" r="3.6" fill="url(#node)"/>
    </g>
  </g>

  <!-- login-box clearing vignette: darkens + flattens the lower-center third -->
  <rect width="2560" height="1440" fill="url(#loginClear)"/>

  <!-- subtle ground horizon line, well below the typical password-box band -->
  <path d="M0 1320 C 620 1270 1180 1300 1660 1250 C 2080 1210 2340 1240 2560 1200 L2560 1440 L0 1440 Z"
        fill="#0a0e14" opacity="0.55"/>
</svg>
